<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyAI Chat Settings</title>
  <style>
    body {
      font-family: 'Inter','Segoe UI',system-ui,sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #f5f6fa; color: #23272f;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f1117; color: #f3f4f6; }
      .card { background: #1a1d25; border-color: #2d3039; }
    }
    .card {
      text-align: center; padding: 40px 32px;
      background: #fff; border: 1.5px solid #e5e7eb; border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); max-width: 360px;
    }
    img { width: 56px; height: 56px; border-radius: 12px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 800; color: #2563eb; margin-bottom: 8px; }
    h1 span { color: #10a37f; }
    p { font-size: 14px; color: #6b7280; margin-bottom: 20px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <img src="../icons/easyChat.png" alt="">
    <h1>EasyAI <span>Chat</span></h1>
    <p id="msg">Click the EasyAI Chat icon in your browser toolbar to configure your API keys and settings.</p>
  </div>
  <script>
    const isFr = (navigator.language || '').startsWith('fr');
    if (isFr) {
      document.getElementById('msg').textContent = 'Cliquez sur l\'icône EasyAI Chat dans la barre d\'outils pour configurer vos clés API et paramètres.';
    }
  </script>
</body>
</html>
