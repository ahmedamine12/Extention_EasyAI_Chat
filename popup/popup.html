<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EasyAI Chat</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- VIEW 1: Dashboard -->
    <div class="view" id="viewDashboard">
      <div class="popup-header">
        <img src="../icons/easyChat.png" alt="" class="popup-logo">
        <span class="popup-title">EasyAI <span class="accent">Chat</span></span>
      </div>

      <div class="provider-cards" id="providerCards">
        <button class="provider-card" data-provider="openai" title="OpenAI">
          <span class="provider-dot" id="dot-openai"></span>
          <svg class="provider-icon" viewBox="0 0 28 28"><circle cx="14" cy="14" r="12" fill="#10a37f"/><text x="14" y="19" text-anchor="middle" font-size="13" fill="#fff" font-family="Arial" font-weight="bold">O</text></svg>
          <span class="provider-name">OpenAI</span>
        </button>
        <button class="provider-card" data-provider="gemini" title="Gemini">
          <span class="provider-dot" id="dot-gemini"></span>
          <svg class="provider-icon" viewBox="0 0 28 28"><circle cx="14" cy="14" r="12" fill="#4285f4"/><text x="14" y="19" text-anchor="middle" font-size="13" fill="#fff" font-family="Arial" font-weight="bold">G</text></svg>
          <span class="provider-name">Gemini</span>
        </button>
        <button class="provider-card" data-provider="huggingface" title="Hugging Face">
          <span class="provider-dot" id="dot-huggingface"></span>
          <svg class="provider-icon" viewBox="0 0 28 28"><circle cx="14" cy="14" r="12" fill="#FFD21E"/><text x="14" y="19" text-anchor="middle" font-size="12" fill="#000" font-family="Arial" font-weight="bold">HF</text></svg>
          <span class="provider-name">HF</span>
          <span class="free-badge">FREE</span>
        </button>
      </div>

      <div class="active-info" id="activeInfo"></div>

      <div class="popup-toggles">
        <div class="toggle-row">
          <span class="toggle-label">☾ <span id="darkModeLabel">Dark Mode</span></span>
          <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <button class="settings-btn" id="showSettings" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 5 15.4a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 5 8.6a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8 5.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82c.14.31.22.65.22 1v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span id="settingsBtnLabel">API Keys</span>
      </button>

      <div class="popup-footer">
        <span>v1.0.0</span>
        <span class="footer-sep">·</span>
        <span>🔒 <span id="privacyLabel">Keys stored locally</span></span>
      </div>
    </div>

    <!-- VIEW 2: API Keys -->
    <div class="view hidden" id="viewSettings">
      <div class="settings-header">
        <button class="back-btn" id="backBtn" type="button" aria-label="Back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="settings-title" id="settingsTitle">API Keys</span>
      </div>

      <form id="keysForm" autocomplete="off">
        <div class="key-block">
          <div class="key-top">
            <div class="key-identity">
              <svg viewBox="0 0 28 28" width="22" height="22"><circle cx="14" cy="14" r="12" fill="#10a37f"/><text x="14" y="19" text-anchor="middle" font-size="13" fill="#fff" font-family="Arial" font-weight="bold">O</text></svg>
              <span class="key-provider">OpenAI</span>
            </div>
            <label class="radio-pill">
              <input type="radio" name="activeProvider" value="openai">
              <span class="radio-dot"></span>
            </label>
          </div>
          <div class="input-wrap">
            <input type="password" id="key-openai" class="key-input" placeholder="sk-..." autocomplete="off">
            <button type="button" class="eye-btn" data-target="key-openai" aria-label="Toggle visibility">
              <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12C3.5 7 8.5 4 12 4s8.5 3 11 8c-2.5 5-7.5 8-11 8s-8.5-3-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M1 12C3.5 7 8.5 4 12 4s8.5 3 11 8c-2.5 5-7.5 8-11 8s-8.5-3-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="4" y1="20" x2="20" y2="4"/></svg>
            </button>
          </div>
          <a class="key-link" href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">Get your API key ↗</a>
          <div class="key-status" id="status-openai"></div>
        </div>

        <div class="key-block">
          <div class="key-top">
            <div class="key-identity">
              <svg viewBox="0 0 28 28" width="22" height="22"><circle cx="14" cy="14" r="12" fill="#4285f4"/><text x="14" y="19" text-anchor="middle" font-size="13" fill="#fff" font-family="Arial" font-weight="bold">G</text></svg>
              <span class="key-provider">Gemini</span>
            </div>
            <label class="radio-pill">
              <input type="radio" name="activeProvider" value="gemini">
              <span class="radio-dot"></span>
            </label>
          </div>
          <div class="input-wrap">
            <input type="password" id="key-gemini" class="key-input" placeholder="AI..." autocomplete="off">
            <button type="button" class="eye-btn" data-target="key-gemini" aria-label="Toggle visibility">
              <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12C3.5 7 8.5 4 12 4s8.5 3 11 8c-2.5 5-7.5 8-11 8s-8.5-3-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M1 12C3.5 7 8.5 4 12 4s8.5 3 11 8c-2.5 5-7.5 8-11 8s-8.5-3-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="4" y1="20" x2="20" y2="4"/></svg>
            </button>
          </div>
          <a class="key-link" href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Get your API key ↗</a>
          <div class="key-status" id="status-gemini"></div>
        </div>

        <div class="key-block">
          <div class="key-top">
            <div class="key-identity">
              <svg viewBox="0 0 28 28" width="22" height="22"><circle cx="14" cy="14" r="12" fill="#FFD21E"/><text x="14" y="19" text-anchor="middle" font-size="12" fill="#000" font-family="Arial" font-weight="bold">HF</text></svg>
              <span class="key-provider">Hugging Face</span>
              <span class="free-tag">FREE</span>
            </div>
            <label class="radio-pill">
              <input type="radio" name="activeProvider" value="huggingface">
              <span class="radio-dot"></span>
            </label>
          </div>
          <div class="input-wrap">
            <input type="password" id="key-huggingface" class="key-input" placeholder="hf_..." autocomplete="off">
            <button type="button" class="eye-btn" data-target="key-huggingface" aria-label="Toggle visibility">
              <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12C3.5 7 8.5 4 12 4s8.5 3 11 8c-2.5 5-7.5 8-11 8s-8.5-3-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M1 12C3.5 7 8.5 4 12 4s8.5 3 11 8c-2.5 5-7.5 8-11 8s-8.5-3-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="4" y1="20" x2="20" y2="4"/></svg>
            </button>
          </div>
          <a class="key-link" href="https://huggingface.co/settings/tokens" target="_blank" rel="noopener">Get your token ↗</a>
          <div class="key-status" id="status-huggingface"></div>
        </div>

        <div class="save-area">
          <button type="submit" class="save-btn" id="saveBtn">Save</button>
          <div class="toast" id="toast"></div>
        </div>
      </form>
    </div>
  </div>

  <script src="../utils/provider-config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
